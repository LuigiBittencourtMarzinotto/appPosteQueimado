version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: poste_db
    restart: unless-stopped
    ports:
      - "3316:3306"
    environment:
      MYSQL_DATABASE: poste_queimado
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - poste_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poste_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - storage_data:/var/www/storage/app/public
    networks:
      - poste_network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: poste_nginx
    restart: unless-stopped
    ports:
      - "9911:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - storage_data:/var/www/storage/app/public
    networks:
      - poste_network
    depends_on:
      - app

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: poste_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: secret
    networks:
      - poste_network
    depends_on:
      db:
        condition: service_healthy

networks:
  poste_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  storage_data:
    driver: local
